<!DOCTYPE html>
<html>
<head>
    <title>RP Engine: GitHub Explorer</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1200px; margin: auto; }
        .card { background: #161b22; padding: 20px; border-radius: 10px; border: 1px solid #30363d; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .full-width { grid-column: 1 / -1; }
        h3 { margin-top: 0; color: #58a6ff; border-bottom: 1px solid #30363d; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Browser Styles */
        .controls { display: flex; gap: 10px; margin-bottom: 15px; }
        select, input { background: #010409; color: #f0f6fc; border: 1px solid #30363d; padding: 10px; border-radius: 6px; }
        select { flex: 1; cursor: pointer; }
        .search-bar { flex: 2; }
        
        #repoBrowser { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 12px; 
            max-height: 400px; 
            overflow-y: auto; 
            padding: 15px; 
            background: #010409; 
            border-radius: 8px;
            border: 1px solid #30363d;
        }
        .repo-item { 
            background: #21262d; 
            padding: 10px; 
            border-radius: 8px; 
            text-align: center; 
            cursor: pointer; 
            border: 1px solid transparent;
            transition: 0.2s;
        }
        .repo-item:hover { border-color: #58a6ff; background: #30363d; }
        .repo-item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 6px; margin-bottom: 8px; background: #000; }
        .repo-item span { font-size: 0.8em; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Form Styles */
        label { display: block; margin: 15px 0 5px; font-size: 0.8em; color: #8b949e; text-transform: uppercase; }
        textarea { width: 100%; padding: 10px; background: #010409; border: 1px solid #30363d; color: #f0f6fc; border-radius: 6px; height: 80px; resize: vertical; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; margin-top: 10px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        .btn-fetch { background: #238636; color: white; width: auto; margin-top: 0; padding: 0 20px; }
        .btn-copy { background: #d29922; color: #000; font-size: 1.1em; }
        .btn-char { background: #1f6feb; color: white; }
        .btn-pers { background: #8957e5; color: white; }
        
        #finalOutput { background: #010409; color: #39ff14; font-family: monospace; height: 120px; border: 1px solid #238636; }
        .disabled { opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body>

<div class="grid">
    <div class="card full-width">
        <h3>Repository Browser</h3>
        <div class="controls">
            <select id="repoCategory">
                <option value="SFW">SFW</option>
                <option value="NSFW">NSFW</option>
                <option value="undereview">Under Review</option>
            </select>
            <select id="repoType">
                <option value="char">Characters</option>
                <option value="personas">Personas</option>
            </select>
            <input type="text" id="repoSearch" class="search-bar" placeholder="Search loaded items..." oninput="filterItems()">
            <button class="btn btn-fetch" onclick="fetchFolders()">Load Folders</button>
        </div>
        <div id="repoBrowser">
            <p style="color:#484f58; grid-column: 1/-1; text-align: center; padding: 20px;">Click "Load Folders" to scan GitHub.</p>
        </div>
    </div>

    <div class="card">
        <h3>Character Data (.char)</h3>
        <label>Character Name:</label>
        <textarea id="charName" style="height:40px;"></textarea>
        <label>Description & Personality:</label>
        <textarea id="charDesc"></textarea>
        <label>Scenario / Setting:</label>
        <textarea id="scenario"></textarea>
        <button class="btn btn-char" onclick="saveFile('char')">Save .char</button>
    </div>

    <div class="card">
        <h3>
            User Persona (.persona)
            <input type="checkbox" id="usePersona" checked onchange="update()">
        </h3>
        <div id="personaFields">
            <label>Your Name:</label>
            <textarea id="yourName" style="height:40px;">User</textarea>
            <label>About You:</label>
            <textarea id="yourDesc"></textarea>
            <button class="btn btn-pers" onclick="saveFile('persona')">Save .persona</button>
        </div>
    </div>

    <div class="card full-width">
        <h3>Final RP Command</h3>
        <textarea id="finalOutput" readonly></textarea>
        <button class="btn btn-copy" onclick="copyResult()">COPY FOR AI</button>
    </div>
</div>

<script>
    // --- CONFIGURATION ---
    const GITHUB_USER = "YOUR_USERNAME"; // <-- Change this!
    const GITHUB_REPO = "AIRPGITHUB";
    const BRANCH = "main";

    // --- REPO SCANNER ---
    async function fetchFolders() {
        const cat = document.getElementById('repoCategory').value;
        const type = document.getElementById('repoType').value;
        const browser = document.getElementById('repoBrowser');
        const path = `${cat}/${type}`;
        
        browser.innerHTML = "Scanning...";

        try {
            const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${path}`);
            const items = await res.json();
            browser.innerHTML = "";

            for (const item of items) {
                if (item.type === 'dir') {
                    const div = document.createElement('div');
                    div.className = 'repo-item';
                    div.setAttribute('data-name', item.name.toLowerCase());
                    div.innerHTML = `<span>Loading...</span>`;
                    browser.appendChild(div);

                    // Universal Detection: Scan inside each folder
                    fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${item.path}`)
                        .then(r => r.json())
                        .then(files => {
                            const img = files.find(f => f.name.match(/\.(png|jpg|jpeg|webp)$/i));
                            const imgUrl = img ? img.download_url : 'https://via.placeholder.com/150/111/444?text=No+Img';
                            div.innerHTML = `<img src="${imgUrl}"><span>${item.name}</span>`;
                            div.onclick = () => loadUniversalData(files, type, item.name);
                        });
                }
            }
        } catch (e) {
            browser.innerHTML = `<p style="color:#f85149; grid-column:1/-1;">Path not found: /${path}</p>`;
        }
    }

    // --- UNIVERSAL DATA LOADER ---
    async function loadUniversalData(files, type, folderName) {
        const ext = (type === 'personas') ? '.persona' : '.char';
        const dataFile = files.find(f => f.name.toLowerCase().endsWith(ext) || f.name.toLowerCase().endsWith('.json'));

        if (!dataFile) return alert(`No ${ext} file found in ${folderName}`);

        try {
            const res = await fetch(dataFile.download_url);
            const data = await res.json();

            if (type === 'personas') {
                document.getElementById('yourName').value = data.name || folderName;
                document.getElementById('yourDesc').value = data.description || "";
            } else {
                document.getElementById('charName').value = data.name || folderName;
                document.getElementById('charDesc').value = data.description || "";
                document.getElementById('scenario').value = data.scenario || "";
            }
            update();
        } catch (e) { alert("Error parsing JSON data."); }
    }

    // --- UTILS ---
    function filterItems() {
        const q = document.getElementById('repoSearch').value.toLowerCase();
        document.querySelectorAll('.repo-item').forEach(i => {
            i.style.display = i.getAttribute('data-name').includes(q) ? 'block' : 'none';
        });
    }

    function update() {
        const cName = document.getElementById('charName').value;
        const cDesc = document.getElementById('charDesc').value;
        const scene = document.getElementById('scenario').value;
        const pName = document.getElementById('yourName').value;
        const pDesc = document.getElementById('yourDesc').value;
        const useP = document.getElementById('usePersona').checked;

        document.getElementById('personaFields').className = useP ? "" : "disabled";

        let str = `You are ${cName || '[Char]'}. ${cDesc}. `;
        if (scene) str += `Scenario: ${scene}. `;
        if (useP) str += `I am ${pName}. ${pDesc}.`;
        
        document.getElementById('finalOutput').value = str;
    }

    function saveFile(type) {
        let data, name;
        if (type === 'char') {
            data = { name: document.getElementById('charName').value, description: document.getElementById('charDesc').value, scenario: document.getElementById('scenario').value };
            name = (data.name || "char") + ".char";
        } else {
            data = { name: document.getElementById('yourName').value, description: document.getElementById('yourDesc').value };
            name = (data.name || "persona") + ".persona";
        }
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob); a.download = name; a.click();
    }

    function copyResult() {
        document.getElementById('finalOutput').select();
        document.execCommand('copy');
        alert("Copied!");
    }

    document.querySelectorAll('textarea').forEach(el => el.addEventListener('input', update));
    update();
</script>
</body>
</html>
