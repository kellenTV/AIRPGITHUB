<!DOCTYPE html>
<html>
<head>
    <title>RP Engine: GitHub Explorer</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #e0e0e0; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1200px; margin: auto; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 10px; border: 1px solid #333; transition: 0.3s; }
        .full-width { grid-column: 1 / -1; }
        h3 { margin-top: 0; color: #4a9eff; border-bottom: 1px solid #333; padding-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Browser Styles */
        .browser-controls { display: flex; gap: 10px; margin-bottom: 15px; }
        select { background: #000; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 5px; flex: 1; }
        #repoBrowser { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 15px; 
            max-height: 400px; 
            overflow-y: auto; 
            padding: 15px; 
            background: #0a0a0a; 
            border: 1px solid #333;
            border-radius: 8px;
        }
        .repo-item { 
            background: #252525; 
            padding: 10px; 
            border-radius: 8px; 
            text-align: center; 
            cursor: pointer; 
            border: 1px solid transparent;
            transition: 0.2s;
        }
        .repo-item:hover { border-color: #4a9eff; background: #2d2d2d; }
        .repo-item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 5px; margin-bottom: 8px; background: #000; }
        .repo-item span { font-size: 0.8em; display: block; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

        /* Form Styles */
        label { display: block; margin: 10px 0 5px; font-size: 0.85em; color: #888; }
        input, textarea { width: 100%; padding: 10px; background: #000; border: 1px solid #444; color: #fff; border-radius: 5px; box-sizing: border-box; }
        textarea { height: 80px; resize: vertical; }
        .btn { width: 100%; padding: 12px; margin-top: 10px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; transition: 0.2s; }
        .btn:hover { opacity: 0.8; }
        .btn-char { background: #4a9eff; color: white; }
        .btn-pers { background: #9b59b6; color: white; }
        .btn-copy { background: #f1c40f; color: black; font-size: 1.1em; }
        .btn-fetch { background: #2ecc71; color: white; width: auto; margin-top: 0; padding: 0 20px; }
        
        #finalOutput { background: #0a0a0a; color: #00ff00; font-family: monospace; height: 100px; }
        .toggle-container { font-size: 0.7em; color: #fff; display: flex; align-items: center; gap: 8px; }
        .toggle-container input { width: auto; }
        .disabled { opacity: 0.4; pointer-events: none; }
    </style>
</head>
<body>

<div class="grid">
    <div class="card full-width">
        <h3>GitHub Repository Explorer</h3>
        <div class="browser-controls">
            <select id="repoCategory">
                <option value="sfw">SFW</option>
                <option value="nsfw">NSFW</option>
                <option value="underreview">Under Review</option>
            </select>
            <select id="repoType">
                <option value="personas">Personas</option>
                <option value="characters">Characters</option>
            </select>
            <button class="btn btn-fetch" onclick="fetchRepoItems()">Browse Folders</button>
        </div>
        <div id="repoBrowser">
            <p style="color:#666; grid-column: 1/-1; text-align: center;">Select category and click "Browse" to load folders.</p>
        </div>
    </div>

    <div class="card">
        <h3>Character / Scenario (.char)</h3>
        <label>Character/Group Name:</label>
        <input type="text" id="charName" placeholder="e.g. Godzilla">
        
        <label>Character Description:</label>
        <textarea id="charDesc" placeholder="Physicality, personality..."></textarea>
        
        <label>Scenario (Optional):</label>
        <textarea id="scenario" placeholder="The setting or event..."></textarea>
        
        <button class="btn btn-char" onclick="exportFile('char')">Save as .char</button>
    </div>

    <div class="card" id="personaCard">
        <h3>
            Your Persona (.persona)
            <div class="toggle-container">
                <input type="checkbox" id="usePersona" checked> <label for="usePersona" style="margin:0; color:white;">ENABLE</label>
            </div>
        </h3>
        <div id="personaFields">
            <label>Your Name:</label>
            <input type="text" id="yourName" value="User">
            
            <label>Your Description:</label>
            <textarea id="yourDesc" placeholder="e.g. a brave traveler"></textarea>
            
            <button class="btn btn-pers" onclick="exportFile('persona')">Save as .persona</button>
        </div>
    </div>

    <div class="card full-width">
        <h3>Final RP Engine Command</h3>
        <textarea id="finalOutput" readonly></textarea>
        <button class="btn btn-copy" onclick="copyResult()">COPY FOR RP</button>
    </div>
</div>

<script>
    // CONFIGURATION: SET YOUR GITHUB DETAILS HERE
    const GITHUB_USER = "kellenTV"; 
    const GITHUB_REPO = "AIRPGITHUB";
    const BRANCH = "main"; // or "master"

    // 1. REPO FETCHING LOGIC
    async function fetchRepoItems() {
        const category = document.getElementById('repoCategory').value;
        const type = document.getElementById('repoType').value;
        const browser = document.getElementById('repoBrowser');
        const path = `${category}/${type}`;
        
        browser.innerHTML = "Fetching folders...";

        try {
            const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${path}`);
            const items = await response.json();

            if (!Array.isArray(items)) throw new Error("Invalid Path");

            browser.innerHTML = "";
            items.forEach(item => {
                if (item.type === 'dir') {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'repo-item';
                    
                    // Assumes PNG name matches Folder Name
                    const imgUrl = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${BRANCH}/${path}/${item.name}/${item.name}.png`;
                    
                    itemDiv.innerHTML = `
                        <img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/150/111/444?text=No+Image'">
                        <span>${item.name}</span>
                    `;
                    
                    itemDiv.onclick = () => loadRepoFile(path, item.name, type);
                    browser.appendChild(itemDiv);
                }
            });
        } catch (e) {
            browser.innerHTML = `<p style="color:#ff4a4a; grid-column: 1/-1;">Error: Check path /${path} or Repository settings.</p>`;
        }
    }

    // 2. FILE LOADING LOGIC
    async function loadRepoFile(path, folderName, type) {
        const ext = (type === 'personas') ? 'persona' : 'char';
        const url = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${BRANCH}/${path}/${folderName}/${folderName}.${ext}`;

        try {
            const res = await fetch(url);
            const data = await res.json();

            if (type === 'personas') {
                document.getElementById('yourName').value = data.name || folderName;
                document.getElementById('yourDesc').value = data.description || "";
                document.getElementById('usePersona').checked = true;
            } else {
                document.getElementById('charName').value = data.name || folderName;
                document.getElementById('charDesc').value = data.description || "";
                document.getElementById('scenario').value = data.scenario || "";
            }
            update();
        } catch (e) {
            alert("Could not find or parse the ." + ext + " file in this folder.");
        }
    }

    // 3. ENGINE CORE LOGIC
    function update() {
        const cName = document.getElementById('charName').value;
        const cDesc = document.getElementById('charDesc').value;
        const scene = document.getElementById('scenario').value;
        const pName = document.getElementById('yourName').value;
        const pDesc = document.getElementById('yourDesc').value;
        const useP = document.getElementById('usePersona').checked;

        document.getElementById('personaFields').className = useP ? "" : "disabled";

        let str = `You are ${cName || '[Character]'} ${cDesc}. `;
        if (scene) str += `In this scenario ${scene}. `;
        
        if (useP) {
            str += `I am ${pName || 'User'} and i am like ${pDesc || 'a traveler'}.`;
        }
        
        document.getElementById('finalOutput').value = str;
    }

    // 4. EXPORT & UTILS
    function exportFile(type) {
        let data, filename;
        if (type === 'char') {
            data = { name: document.getElementById('charName').value, description: document.getElementById('charDesc').value, scenario: document.getElementById('scenario').value };
            filename = (data.name || "character") + ".char";
        } else {
            data = { name: document.getElementById('yourName').value, description: document.getElementById('yourDesc').value };
            filename = (data.name || "persona") + ".persona";
        }
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
    }

    function copyResult() {
        const output = document.getElementById('finalOutput');
        output.select();
        document.execCommand('copy');
        alert("Prompt copied to clipboard!");
    }

    // Event Listeners
    document.querySelectorAll('input, textarea').forEach(el => el.addEventListener('input', update));
    document.getElementById('usePersona').addEventListener('change', update);
    
    update();
</script>

</body>
</html>
