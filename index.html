<!DOCTYPE html>
<html>
<head>
    <title>RP Engine: Char & Persona Manager</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #e0e0e0; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1000px; margin: auto; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 10px; border: 1px solid #333; transition: 0.3s; }
        .full-width { grid-column: 1 / -1; }
        h3 { margin-top: 0; color: #4a9eff; border-bottom: 1px solid #333; padding-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
        label { display: block; margin: 10px 0 5px; font-size: 0.85em; color: #888; }
        input, textarea { width: 100%; padding: 10px; background: #000; border: 1px solid #444; color: #fff; border-radius: 5px; box-sizing: border-box; }
        textarea { height: 80px; resize: vertical; }
        
        /* Buttons */
        .btn { width: 100%; padding: 12px; margin-top: 10px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .btn-char { background: #4a9eff; color: white; }
        .btn-pers { background: #9b59b6; color: white; }
        .btn-copy { background: #f1c40f; color: black; font-size: 1.1em; }
        .btn-browse { background: #2ecc71; color: white; width: auto; margin-top: 0; padding: 0 20px; }
        .file-label { background: #252525; padding: 10px; display: block; text-align: center; border: 1px dashed #555; cursor: pointer; margin-bottom: 10px; font-size: 0.9em; }

        /* Browser Section */
        .browser-bar { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        #repoBrowser { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); 
            gap: 10px; 
            max-height: 350px; 
            overflow-y: auto; 
            background: #0a0a0a; 
            padding: 15px; 
            border-radius: 5px; 
            border: 1px solid #333;
        }
        .repo-item { background: #252525; padding: 8px; border-radius: 5px; text-align: center; cursor: pointer; font-size: 0.8em; border: 1px solid transparent; display: flex; flex-direction: column; align-items: center; justify-content: space-between;}
        .repo-item:hover { border-color: #4a9eff; background: #2a2a2a; }
        .repo-item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 3px; margin-bottom: 8px; background: #111; }
        
        #finalOutput { background: #0a0a0a; color: #00ff00; font-family: monospace; height: 100px; }
        .toggle-container { font-size: 0.7em; color: #fff; display: flex; align-items: center; gap: 8px; }
        .toggle-container input { width: auto; }
        .disabled { opacity: 0.4; pointer-events: none; }
    </style>
</head>
<body>

<div class="grid">
    <div class="card full-width">
        <h3>GitHub Explorer</h3>
        <div class="browser-bar">
            <select id="repoCategory" style="background:#000; color:#fff; border:1px solid #444; padding:5px; flex:1;">
                <option value="SFW">SFW</option>
                <option value="NSFW">NSFW</option>
                <option value="undereview">Under Review</option>
            </select>
            <select id="repoType" style="background:#000; color:#fff; border:1px solid #444; padding:5px; flex:1;">
                <option value="char">Characters</option>
                <option value="personas">Personas</option>
            </select>
            <input type="text" id="repoSearch" placeholder="Search folder names..." style="flex:2;" onkeyup="filterRepo()">
            <button class="btn btn-browse" onclick="fetchRepo()">Browse</button>
        </div>
        <div id="repoBrowser">
            <p style="color:#555; font-size:0.9em; text-align:center; grid-column:1/-1;">Click Browse to load your GitHub files.</p>
        </div>
    </div>

    <div class="card">
        <h3>1. Character / Scenario (.char)</h3>
        <label class="file-label">Import .char File <input type="file" id="importChar" accept=".char,.json" style="display:none"></label>
        <label>Character/Group Name:</label>
        <input type="text" id="charName" placeholder="e.g. Godzilla">
        <label>Character Description:</label>
        <textarea id="charDesc" placeholder="Physicality, personality..."></textarea>
        <label>Scenario (Optional):</label>
        <textarea id="scenario" placeholder="The setting or event..."></textarea>
        <button class="btn btn-char" onclick="exportFile('char')">Save as .char</button>
    </div>

    <div class="card" id="personaCard">
        <h3>
            2. Your Persona (.persona)
            <div class="toggle-container">
                <input type="checkbox" id="usePersona" checked> <label for="usePersona" style="margin:0; color:white;">ENABLE</label>
            </div>
        </h3>
        <div id="personaFields">
            <label class="file-label">Import .persona File <input type="file" id="importPers" accept=".persona,.json" style="display:none"></label>
            <label>Your Name:</label>
            <input type="text" id="yourName" value="User">
            <label>Your Description:</label>
            <textarea id="yourDesc" placeholder="e.g. a brave traveler"></textarea>
            <button class="btn btn-pers" onclick="exportFile('persona')">Save as .persona</button>
        </div>
    </div>

    <div class="card full-width">
        <h3>3. Final RP Engine Command</h3>
        <textarea id="finalOutput" readonly></textarea>
        <button class="btn btn-copy" onclick="copyResult()">COPY FOR RP</button>
    </div>
</div>

<script>
    const GITHUB_USER = "kellenTV"; 
    const GITHUB_REPO = "AIRPGITHUB";

    // --- REPO BROWSER ---
    async function fetchRepo() {
        const cat = document.getElementById('repoCategory').value;
        const type = document.getElementById('repoType').value;
        const browser = document.getElementById('repoBrowser');
        const path = `${cat}/${type}`;
        browser.innerHTML = "<p style='grid-column:1/-1; text-align:center;'>Scanning Repository...</p>";

        try {
            const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${path}`);
            const items = await res.json();
            
            if (!Array.isArray(items)) throw new Error("Invalid Path");
            
            browser.innerHTML = "";
            const folders = items.filter(f => f.type === 'dir');

            for (const f of folders) {
                const div = document.createElement('div');
                div.className = 'repo-item';
                div.setAttribute('data-name', f.name.toLowerCase());
                // Default placeholder while loading
                div.innerHTML = `<div style="width:100%; aspect-ratio:1/1; background:#111; border-radius:3px; margin-bottom:5px;"></div><span>${f.name}</span>`;
                browser.appendChild(div);

                // Fetch internal folder content for images and data
                fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${f.path}`)
                    .then(r => r.json())
                    .then(files => {
                        // Find ANY image format
                        const img = files.find(file => file.name.match(/\.(png|jpg|jpeg|webp|gif|bmp|svg)$/i));
                        const imgHtml = img ? `<img src="${img.download_url}" alt="${f.name}">` : `<div style="width:100%; aspect-ratio:1/1; background:#333; display:flex; align-items:center; justify-content:center; border-radius:3px; margin-bottom:5px; font-size:10px; color:#555;">NO IMG</div>`;
                        
                        div.innerHTML = `${imgHtml}<span>${f.name}</span>`;
                        div.onclick = () => loadData(files, type, f.name);
                    });
            }
        } catch (e) { 
            browser.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:#ff4a4a;">Error: Folder '${path}' not found or API limit reached.</p>`; 
        }
    }

    function filterRepo() {
        const q = document.getElementById('repoSearch').value.toLowerCase();
        const items = document.querySelectorAll('.repo-item');
        let visibleCount = 0;

        items.forEach(i => {
            const name = i.getAttribute('data-name');
            if (name.includes(q)) {
                i.style.display = 'flex';
                visibleCount++;
            } else {
                i.style.display = 'none';
            }
        });
    }

    // --- DATA LOADING ---
    async function loadData(files, type, folderName) {
        const ext = (type === 'personas') ? '.persona' : '.char';
        const dataFile = files.find(f => f.name.toLowerCase().endsWith(ext) || f.name.toLowerCase().endsWith('.json'));
        
        if (!dataFile) return alert("No .char or .persona file found in this folder.");

        const res = await fetch(dataFile.download_url);
        const data = await res.json();

        if (type === 'personas') {
            document.getElementById('yourName').value = data.name || folderName;
            document.getElementById('yourDesc').value = data.description || "";
        } else {
            document.getElementById('charName').value = data.name || folderName;
            document.getElementById('charDesc').value = data.description || "";
            document.getElementById('scenario').value = data.scenario || "";
        }
        update();
    }

    // --- CORE LOGIC & EXPORT ---
    function update() {
        const cName = document.getElementById('charName').value;
        const cDesc = document.getElementById('charDesc').value;
        const scene = document.getElementById('scenario').value;
        const pName = document.getElementById('yourName').value;
        const pDesc = document.getElementById('yourDesc').value;
        const useP = document.getElementById('usePersona').checked;

        document.getElementById('personaFields').className = useP ? "" : "disabled";

        let str = `You are ${cName || '[Character]'}. ${cDesc}. `;
        if (scene) str += `In this scenario: ${scene}. `;
        if (useP) str += `I am ${pName || 'User'}, described as: ${pDesc || 'a traveler'}.`;
        document.getElementById('finalOutput').value = str;
    }

    function exportFile(type) {
        let data, filename;
        if (type === 'char') {
            data = { name: document.getElementById('charName').value, description: document.getElementById('charDesc').value, scenario: document.getElementById('scenario').value };
            filename = (data.name || "character") + ".char";
        } else {
            data = { name: document.getElementById('yourName').value, description: document.getElementById('yourDesc').value };
            filename = (data.name || "persona") + ".persona";
        }
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob); a.download = filename; a.click();
    }

    function copyResult() {
        const output = document.getElementById('finalOutput');
        output.select();
        document.execCommand('copy');
        const btn = document.querySelector('.btn-copy');
        btn.innerText = "COPIED!";
        setTimeout(() => btn.innerText = "COPY FOR RP", 2000);
    }

    // Init listeners
    document.querySelectorAll('input, textarea').forEach(el => el.addEventListener('input', update));
    document.getElementById('usePersona').addEventListener('change', update);
    
    // File upload listeners
    document.getElementById('importChar').onchange = (e) => handleFile(e, 'char');
    document.getElementById('importPers').onchange = (e) => handleFile(e, 'pers');

    function handleFile(e, type) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const data = JSON.parse(ev.target.result);
            if(type === 'char') {
                document.getElementById('charName').value = data.name || "";
                document.getElementById('charDesc').value = data.description || "";
                document.getElementById('scenario').value = data.scenario || "";
            } else {
                document.getElementById('yourName').value = data.name || "";
                document.getElementById('yourDesc').value = data.description || "";
            }
            update();
        };
        reader.readAsText(e.target.files[0]);
    }

    update();
</script>
</body>
</html>
